<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glimr - Connect</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 min-h-screen flex flex-col">

    <!-- Navigation Bar -->
    <nav class="w-full py-6 flex justify-center gap-8 text-gray-400 border-b border-white/10">
        <a href="index.html" class="hover:text-white transition font-medium">Home</a>
        <a href="chat.html" class="hover:text-white transition font-medium">Chat</a>
        <a href="connect.html" class="hover:text-white transition font-medium">Connect</a>
    </nav>

    <!-- Main Content Area -->
    <main class="flex-grow flex items-center justify-center w-full p-4">
        <div class="bg-slate-800 p-8 rounded-2xl border border-slate-700 shadow-xl max-w-lg w-full">
            <h1 class="text-white text-2xl font-bold mb-4">Connect</h1>
            <p class="text-slate-400 mb-6">Reach out to your network or share your Glimr profile.</p>
            
            <div class="space-y-4">
                <input type="text" placeholder="Your Name" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-3 text-white placeholder-slate-500">
                <textarea placeholder="Your message..." class="w-full bg-slate-900 border border-slate-700 rounded-lg p-3 text-white placeholder-slate-500 h-32"></textarea>
                <button class="w-full bg-amber-400 text-slate-900 font-bold py-3 rounded-lg hover:bg-amber-300 transition">
                    Send Request
                </button>
            </div>
        </div>
    </main>

</body>
</html>
