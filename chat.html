<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glimr - Chat</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 min-h-screen flex flex-col text-white">

    <nav class="w-full py-6 flex justify-center gap-8 text-gray-400 border-b border-white/10">
        <a href="index.html" class="hover:text-white transition font-medium">Home</a>
        <a href="chat.html" class="hover:text-white transition font-medium">Chat</a>
        <a href="connect.html" class="hover:text-white transition font-medium">Connect</a>
    </nav>

    <main class="flex-grow flex items-center justify-center w-full p-4">
        <div class="bg-slate-800 p-8 rounded-2xl border border-slate-700 shadow-xl max-w-lg w-full">
            <h1 class="text-2xl font-bold mb-1">Inner Circle</h1>
            <p class="text-slate-400 text-sm mb-6">Eiffel Challenge • Share Map</p>

            <div id="chat-window" class="h-64 overflow-y-auto mb-4 p-2 space-y-4">
                <div class="bg-slate-700 p-3 rounded-lg text-sm w-fit">Welcome to your private space. The memories start here.</div>
            </div>

            <div class="flex gap-2">
                <input id="message-input" type="text" placeholder="Type a message..." class="flex-grow bg-slate-900 border border-slate-700 rounded-lg p-3 text-white placeholder-slate-500 focus:outline-none focus:border-amber-400">
                <button id="send-btn" class="bg-white text-slate-900 px-6 font-bold rounded-lg hover:bg-slate-200 transition">Send</button>
            </div>
        </div>
    </main>

    <script src="app.js" defer></script>
</body>
</html>
