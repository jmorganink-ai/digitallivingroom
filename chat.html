<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glimr - Chat</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #FFB3C6; color: #61215A; }
        .fun-card { background-color: #C1F0DD; }
        .accent-btn { background-color: #FFD25F; }
    </style>
</head>
<body class="min-h-screen flex flex-col font-sans">
    <nav class="py-6 flex justify-center gap-8 font-bold text-white">
        <a href="index.html" class="hover:underline">Home</a>
        <a href="chat.html" class="underline">Chat</a>
        <a href="connect.html" class="hover:underline">Connect</a>
    </nav>

    <main class="flex-grow flex items-center justify-center w-full p-4">
        <div class="fun-card p-8 rounded-3xl border-4 border-white shadow-xl max-w-lg w-full">
            <h1 class="text-2xl font-black mb-1">Inner Circle</h1>
            <p class="text-sm mb-6 opacity-70">Eiffel Challenge • Share Map</p>

            <div id="chat-window" class="h-64 overflow-y-auto mb-4 p-4 space-y-4 bg-white/40 rounded-xl">
                <div class="bg-white p-3 rounded-lg text-sm w-fit shadow-sm">Welcome to your private space!</div>
            </div>

            <div class="flex gap-2">
                <input id="message-input" type="text" placeholder="Type..." class="flex-grow bg-white/70 border-2 border-white rounded-xl p-3">
                <button id="send-btn" class="accent-btn px-6 font-bold rounded-xl hover:scale-105 transition-transform">Send</button>
            </div>
        </div>
    </main>
    <script src="app.js" defer></script>
</body>
</html>
