<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glimr - Home</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #FFB3C6; color: #61215A; }
        .fun-card { background-color: #C1F0DD; }
        .accent-btn { background-color: #FFD25F; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6 font-sans">
    <div class="fun-card p-10 rounded-3xl border-4 border-white shadow-xl max-w-md w-full text-center">
        <div class="w-24 h-24 mx-auto mb-6 bg-white/50 rounded-full flex items-center justify-center text-4xl">🎁</div>
        
        <h1 class="text-3xl font-black mb-3">Birthday Time-Lock™</h1>
        <p class="mb-6 opacity-80">Set your Glimr to unlock at midnight on their birthday. No peeking!</p>

        <input type="email" placeholder="you@email.com" class="w-full bg-white/70 border-2 border-white rounded-xl p-4 mb-3 placeholder-pink-400">
        <button id="notify-btn" class="accent-btn w-full font-bold py-4 rounded-xl hover:scale-105 transition-transform">
            Notify me
        </button>
    </div>
</body>
</html>
