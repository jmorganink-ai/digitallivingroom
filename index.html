<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LensFlow | Unified Platform</title>
    <style>
        :root {
            /* Electric Sky (Management) */
            --bg-main: #F0F9FF;
            --accent-main: #F59E0B;
            --text-main: #1E293B;

            /* FocusEngine (Recording) */
            --bg-surface: #1E293B;
            --accent-surface: #22C55E;
            --text-surface: #F8FAFC;
        }

        body, html { margin: 0; padding: 0; font-family: sans-serif; height: 100%; transition: background-color 0.4s ease, color 0.4s ease; }
        .app-container { height: 100vh; width: 100vw; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; box-sizing: border-box; }

        .electric-sky { background-color: var(--bg-main); color: var(--text-main); }
        .focus-engine { background-color: var(--bg-surface); color: var(--text-surface); }

        .toggle-btn { padding: 10px 20px; cursor: pointer; border: none; border-radius: 5px; font-weight: bold; margin-bottom: 20px; transition: 0.3s; }
        .btn-focus { background-color: var(--accent-surface); color: var(--bg-surface); }
        .btn-electric { background-color: var(--accent-main); color: white; }

        #managementView { width: 100%; max-width: 800px; display: block; }
        #recordingView { width: 100%; max-width: 800px; display: none; text-align: center; }
        
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
        .stat-card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); color: var(--text-main); }
        
        #cameraFeed { background: #000; border-radius: 10px; width: 100%; max-width: 640px; border: 4px solid var(--accent-surface); transform: scaleX(-1); }
        
        .status-badge { margin-top: 30px; padding: 5px 15px; border-radius: 15px; font-size: 0.8rem; border: 2px solid; }
    </style>
</head>
<body class="electric-sky" id="appRoot">

    <div class="app-container">
        <button class="toggle-btn btn-focus" onclick="toggleMode()" id="modeToggleBtn">Switch to FocusEngine</button>
        
        <div id="contentArea">
            <div id="managementView">
                <h1 id="modeTitle">LensFlow | Electric Sky</h1>
                <p id="modeDesc">Management & Glimr Integration Layer</p>
                <div class="stats-grid">
                    <div class="stat-card"><h3>Glimr Assets</h3><p>Active Leads: 12</p></div>
                    <div class="stat-card"><h3>LensFlow Status</h3><p>Storage: 45% used</p></div>
                </div>
            </div>

            <div id="recordingView">
                <h2>Hardware Surface: Active</h2>
                <video id="cameraFeed" autoplay playsinline muted></video>
                <div style="margin-top: 20px;">
                    <button id="recBtn" class="btn-focus" style="padding: 15px 40px; font-size: 1.2rem; border-radius: 8px; border: none; cursor: pointer;" onclick="toggleRecording()">Start Recording</button>
                </div>
            </div>

            <div class="status-badge" id="statusBadge" style="border-color: var(--accent-main);">System Status: Operational</div>
        </div>
    </div>

    <script>
        const video = document.getElementById('cameraFeed');
        const recBtn = document.getElementById('recBtn');
        let mediaRecorder;
        let recordedChunks = [];

        // Camera Logic
        async function startCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                video.srcObject = stream;
            } catch (err) { alert("Camera access denied."); }
        }

        // Recording Logic
        function toggleRecording() {
            if (recBtn.innerText === "Start Recording") {
                startRecording();
            } else {
                stopRecording();
            }
        }

        function startRecording() {
            recordedChunks = [];
            const stream = video.srcObject;
            mediaRecorder = new MediaRecorder(stream);
            mediaRecorder.ondataavailable = (e) => recordedChunks.push(e.data);
            mediaRecorder.onstop = saveRecording;
            mediaRecorder.start();
            recBtn.innerText = "Stop Recording";
            recBtn.style.backgroundColor = "#EF4444"; // Red for recording
        }

        function stopRecording() {
            mediaRecorder.stop();
            recBtn.innerText = "Start Recording";
            recBtn.style.backgroundColor = "var(--accent-surface)";
        }

        function saveRecording() {
            const blob = new Blob(recordedChunks, { type: 'video/webm' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'lensflow-recording.webm';
            a.click();
        }

        // Mode Switching
        function toggleMode() {
            const root = document.getElementById('appRoot');
            const btn = document.getElementById('modeToggleBtn');
            const mgmt = document.getElementById('managementView');
            const record = document.getElementById('recordingView');
            const badge = document.getElementById('statusBadge');
            const title = document.getElementById('modeTitle');

            if (root.classList.contains('electric-sky')) {
                root.classList.replace('electric-sky', 'focus-engine');
                mgmt.style.display = "none";
                record.style.display = "block";
                btn.innerText = "Switch to Electric Sky";
                btn.classList.replace('btn-focus', 'btn-electric');
                badge.style.borderColor = "var(--accent-surface)";
                title.innerText = "FocusEngine | Hardware Surface";
                startCamera();
            } else {
                root.classList.replace('focus-engine', 'electric-sky');
                mgmt.style.display = "block";
                record.style.display = "none";
                btn.innerText = "Switch to FocusEngine";
                btn.classList.replace('btn-electric', 'btn-focus');
                badge.style.borderColor = "var(--accent-main)";
                title.innerText = "LensFlow | Electric Sky";
            }
        }
    </script>
</body>
</html>
