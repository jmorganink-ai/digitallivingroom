<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LensFlow | Unified Platform</title>
    <style>
        :root {
            /* Electric Sky (Unified Main Platform / Management) */
            --bg-main: #F0F9FF;
            --accent-main: #F59E0B;
            --text-main: #1E293B;

            /* FocusEngine (Hardware Surface / Recording Layer) */
            --bg-surface: #1E293B;
            --accent-surface: #22C55E;
            --text-surface: #F8FAFC;
        }

        body, html {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            height: 100%;
            transition: all 0.3s ease;
        }

        .app-container {
            height: 100vh;
            width: 100vw;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            box-sizing: border-box;
        }

        .electric-sky { background-color: var(--bg-main); color: var(--text-main); }
        .focus-engine { background-color: var(--bg-surface); color: var(--text-surface); }

        .toggle-btn { padding: 10px 20px; cursor: pointer; border: none; border-radius: 5px; font-weight: bold; margin-bottom: 20px; }
        .btn-electric { background-color: var(--accent-main); color: white; }
        .btn-focus { background-color: var(--accent-surface); color: var(--bg-surface); }

        #managementView { width: 100%; max-width: 800px; display: block; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
        .stat-card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        
        .status-badge { margin-top: 20px; padding: 5px 10px; border-radius: 15px; font-size: 0.8rem; border: 2px solid var(--accent-main); }
    </style>
</head>
<body class="electric-sky" id="appRoot">

    <div class="app-container" id="container">
        <button class="toggle-btn btn-focus" onclick="toggleMode()">Switch to FocusEngine</button>
        
        <div id="contentArea">
            <h1 id="modeTitle">LensFlow | Electric Sky</h1>
            <p id="modeDesc">Management & Glimr Integration Layer</p>
            
            <div id="managementView">
                <div class="stats-grid">
                    <div class="stat-card">
                        <h3>Glimr Assets</h3>
                        <p>Active Leads: 12</p>
                        <button style="background: var(--accent-main); border: none; padding: 8px; border-radius: 4px; color: white;">Sync Data</button>
                    </div>
                    <div class="stat-card">
                        <h3>LensFlow Status</h3>
                        <p>Storage: 45% used</p>
                        <button style="background: var(--accent-main); border: none; padding: 8px; border-radius: 4px; color: white;">Manage Storage</button>
                    </div>
                </div>
            </div>

            <div class="status-badge" id="statusBadge">System Status: Operational</div>
        </div>
    </div>

    <script>
        function toggleMode() {
            const root = document.getElementById('appRoot');
            const title = document.getElementById('modeTitle');
            const desc = document.getElementById('modeDesc');
            const badge = document.getElementById('statusBadge');
            const btn = document.querySelector('.toggle-btn');
            const mgmt = document.getElementById('managementView');

            if (root.classList.contains('electric-sky')) {
                root.classList.remove('electric-sky');
                root.classList.add('focus-engine');
                
                title.innerText = "FocusEngine | Hardware Surface";
                desc.innerText = "Recording Engine Active";
                mgmt.style.display = "none"; // Hide management dashboard in focus mode
                badge.style.borderColor = "var(--accent-surface)";
                btn.innerText = "Switch to Electric Sky";
                btn.classList.remove('btn-focus');
                btn.classList.add('btn-electric');
            } else {
                root.classList.remove('focus-engine');
                root.classList.add('electric-sky');
                
                title.innerText = "LensFlow | Electric Sky";
                desc.innerText = "Management & Glimr Integration Layer";
                mgmt.style.display = "block"; // Show management dashboard
                badge.style.borderColor = "var(--accent-main)";
                btn.innerText = "Switch to FocusEngine";
                btn.classList.remove('btn-electric');
                btn.classList.add('btn-focus');
            }
        }
    </script>
</body>
</html>
