<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LensFlow | Unified Platform</title>
    <style>
        :root {
            /* Electric Sky (Management Layer) */
            --bg-main: #F0F9FF;
            --accent-main: #F59E0B;
            --text-main: #1E293B;

            /* FocusEngine (Hardware Surface) */
            --bg-surface: #1E293B;
            --accent-surface: #22C55E;
            --text-surface: #F8FAFC;
        }

        body, html {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            height: 100%;
            transition: background-color 0.4s ease, color 0.4s ease;
        }

        .app-container {
            height: 100vh;
            width: 100vw;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            box-sizing: border-box;
        }

        /* Mode Styles */
        .electric-sky { background-color: var(--bg-main); color: var(--text-main); }
        .focus-engine { background-color: var(--bg-surface); color: var(--text-surface); }

        .toggle-btn { padding: 10px 20px; cursor: pointer; border: none; border-radius: 5px; font-weight: bold; margin-bottom: 20px; transition: 0.3s; }
        .btn-focus { background-color: var(--accent-surface); color: var(--bg-surface); }
        .btn-electric { background-color: var(--accent-main); color: white; }

        /* Dashboard & Recording View */
        #managementView { width: 100%; max-width: 800px; display: block; }
        #recordingView { width: 100%; max-width: 800px; display: none; text-align: center; }
        
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
        .stat-card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); color: var(--text-main); }
        
        #cameraFeed { background: #000; border-radius: 10px; width: 100%; max-width: 640px; border: 4px solid var(--accent-surface); }
        
        .status-badge { margin-top: 30px; padding: 5px 15px; border-radius: 15px; font-size: 0.8rem; border: 2px solid; }
    </style>
</head>
<body class="electric-sky" id="appRoot">

    <div class="app-container">
        <button class="toggle-btn btn-focus" onclick="toggleMode()" id="modeToggleBtn">Switch to FocusEngine</button>
        
        <div id="contentArea">
            <!-- MANAGEMENT LAYER -->
            <div id="managementView">
                <h1 id="modeTitle">LensFlow | Electric Sky</h1>
                <p id="modeDesc">Management & Glimr Integration Layer</p>
                <div class="stats-grid">
                    <div class="stat-card">
                        <h3>Glimr Assets</h3>
                        <p>Active Leads: 12</p>
                        <button style="background: var(--accent-main); border: none; padding: 8px; border-radius: 4px; color: white; cursor: pointer;">Sync Data</button>
                    </div>
                    <div class="stat-card">
                        <h3>LensFlow Status</h3>
                        <p>Storage: 45% used</p>
                        <button style="background: var(--accent-main); border: none; padding: 8px; border-radius: 4px; color: white; cursor: pointer;">Manage Storage</button>
                    </div>
                </div>
            </div>

            <!-- RECORDING LAYER -->
            <div id="recordingView">
                <h2>Hardware Surface: Active</h2>
                <video id="cameraFeed" autoplay playsinline></video>
                <div style="margin-top: 20px;">
                    <button class="btn-focus" style="padding: 15px 40px; font-size: 1.2rem; border-radius: 8px; border: none; cursor: pointer;">Start Recording</button>
                </div>
            </div>

            <div class="status-badge" id="statusBadge" style="border-color: var(--accent-main);">System Status: Operational</div>
        </div>
    </div>

    <script>
        function toggleMode() {
            const root = document.getElementById('appRoot');
            const btn = document.getElementById('modeToggleBtn');
            const mgmt = document.getElementById('managementView');
            const record = document.getElementById('recordingView');
            const badge = document.getElementById('statusBadge');
            const title = document.getElementById('modeTitle');

            if (root.classList.contains('electric-sky')) {
                // Switch to FocusEngine
                root.classList.remove('electric-sky');
                root.classList.add('focus-engine');
                
                mgmt.style.display = "none";
                record.style.display = "block";
                
                btn.innerText = "Switch to Electric Sky";
                btn.classList.remove('btn-focus');
                btn.classList.add('btn-electric');
                
                badge.style.borderColor = "var(--accent-surface)";
                title.innerText = "FocusEngine | Hardware Surface";
            } else {
                // Switch to Electric Sky
                root.classList.remove('focus-engine');
                root.classList.add('electric-sky');
                
                mgmt.style.display = "block";
                record.style.display = "none";
                
                btn.innerText = "Switch to FocusEngine";
                btn.classList.remove('btn-electric');
                btn.classList.add('btn-focus');
                
                badge.style.borderColor = "var(--accent-main)";
                title.innerText = "LensFlow | Electric Sky";
            }
        }
    </script>
</body>
</html>
