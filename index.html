<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glimr Time-Lock</title>
    <!-- Essential: This loads the CSS framework -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 3D Depth Utilities */
        .card-3d {
            background: linear-gradient(150deg, #1a1a2e 0%, #16213e 100%);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), 
                        inset 0 1px 1px rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .card-3d:hover { transform: translateY(-10px) scale(1.02); }
        
        .glass-input {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body class="bg-slate-900 flex items-center justify-center min-h-screen">
     <!-- Navigation Bar -->
     <nav class="flex justify-center space-x-6 py-6 text-gray-400">
     <a href="index.html" class="hover:text-white transition">Home</a>
     <a href="chat.html" class="hover:text-white transition">Chat</a>
     <a href="connect.html" class="hover:text-white transition">Connect</a>
     </nav>
    
    <!-- Birthday Time-Lock™ Card -->
    <div class="card-3d rounded-3xl p-8 max-w-sm w-full mx-auto text-white">
        <!-- Visual Indicator -->
        <div class="w-16 h-16 rounded-2xl bg-gradient-to-tr from-amber-500 to-yellow-600 mb-6 flex items-center justify-center shadow-lg shadow-yellow-500/20">
            <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
        </div>

        <h2 class="text-2xl font-semibold tracking-tight mb-2">Birthday Time-Lock™</h2>
        <p class="text-gray-400 text-sm mb-6 leading-relaxed">Set your Glimr to unlock at midnight on their birthday. No peeking.</p>

        <input type="email" placeholder="you@email.com" class="glass-input w-full p-4 rounded-xl mb-4 text-white placeholder-gray-500 focus:ring-2 focus:ring-amber-500 outline-none transition">
        
        <button class="w-full bg-white text-black font-bold py-4 rounded-xl hover:bg-gray-200 transition shadow-xl shadow-white/10">
            Notify me
        </button>
    </div>

</body>
</html>
