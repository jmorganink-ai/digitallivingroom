<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><title>Glimr | Studio</title><style>
:root{--bg:#0f0f0f;--gold:#f59e0b;--card:#1a1a1a;--txt:#fff}body{margin:0;background:var(--bg);color:var(--txt);font-family:sans-serif}
.app{max-width:900px;margin:auto;padding:20px}.card{background:var(--card);padding:20px;border-radius:15px;margin:10px 0;border:1px solid #333}
textarea{width:100%;height:60px;background:#000;color:#fff;border:1px solid #444;border-radius:8px;padding:10px}
.premium{border:2px solid var(--gold)!important;box-shadow:0 0 15px var(--gold)}
.studio{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:#000;z-index:99}
video{width:100%;height:100%;object-fit:cover;transform:scaleX(-1)}
.tele{position:absolute;bottom:10%;left:5%;width:90%;background:rgba(0,0,0,.6);padding:20px;border-radius:15px;text-align:center}
</style></head><body><div class="app" id="dash">
<h2>GLIMR DASHBOARD</h2>
<div class="card"><h3>ScriptLens™</h3><textarea id="in"></textarea><button onclick="ai()">✨ Magic Rewrite</button></div>
<div class="card"><h3>Booth Premium</h3><label><input type="checkbox" id="prem" onchange="p()"> Enable 4K Strips</label></div>
<div class="card"><h3>Time-Lock™</h3><input type="datetime-local" id="lock"> <button onclick="saveLock()">Set Lock</button></div>
<button onclick="s(1)" style="width:100%;padding:20px;font-size:1.2rem">Enter Studio</button>
<div id="recap" class="card"><h3>Magic Recap</h3><p id="recText">No recording yet.</p></div></div>
<div class="studio" id="stud"><div style="position:absolute;top:20px;left:20px"><button onclick="s(0)">Back</button><button id="rec" onclick="r()">Rec</button></div>
<video id="v" autoplay playsinline muted></video><div id="tele" class="tele">...</div></div>
<script>
const v=document.getElementById('v'),s=(t)=>{document.getElementById('dash').style.display=t?'none':'block';document.getElementById('stud').style.display=t?'block':'none';if(t)navigator.mediaDevices.getUserMedia({video:true,audio:true}).then(st=>v.srcObject=st)};
document.getElementById('in').oninput=(e)=>document.getElementById('tele').innerText=e.target.value;
function ai(){document.getElementById('in').value+="... (AI Polished: A memory that lasts.)";document.getElementById('tele').innerText=document.getElementById('in').value}
function r(){const b=document.getElementById('rec');if(b.innerText=='Rec'){b.innerText='Stop';document.getElementById('recText').innerText="Recap: "+document.getElementById('in').value.substring(0,50)+"..."}else{b.innerText='Rec'}}
function p(){v.className=document.getElementById('prem').checked?'premium':''}
function saveLock(){const t=new Date(document.getElementById('lock').value);alert(t>new Date()?"Locked until "+t.toLocaleString():"Date invalid");}
</script></body></html>
