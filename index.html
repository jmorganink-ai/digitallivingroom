<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LensFlow | Unified Platform</title>
    <style>
        :root {
            --bg-main: #F0F9FF; --accent-main: #F59E0B; --text-main: #1E293B;
            --bg-surface: #1E293B; --accent-surface: #22C55E; --text-surface: #F8FAFC;
        }
        body, html { margin: 0; padding: 0; font-family: sans-serif; height: 100%; transition: background-color 0.4s ease; }
        
        #globalHeader { height: 60px; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; border-bottom: 2px solid transparent; transition: all 0.4s ease; }
        .header-electric { background: #fff; border-bottom-color: var(--accent-main); color: var(--text-main); }
        .header-focus { background: #0f172a; border-bottom-color: var(--accent-surface); color: var(--text-surface); }

        .app-container { height: calc(100vh - 60px); width: 100vw; display: flex; flex-direction: column; align-items: center; padding: 40px 20px; box-sizing: border-box; overflow-y: auto; }
        .electric-sky { background-color: var(--bg-main); color: var(--text-main); }
        .focus-engine { background-color: var(--bg-surface); color: var(--text-surface); }

        .btn { padding: 10px 20px; cursor: pointer; border: none; border-radius: 5px; font-weight: bold; }
        #managementView, #recordingView { width: 100%; max-width: 900px; }
        .card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); color: var(--text-main); margin-bottom: 20px; }
        
        /* FocusEngine UI */
        .video-wrapper { position: relative; width: 100%; max-width: 640px; margin: 0 auto; }
        #cameraFeed { background: #000; border-radius: 10px; width: 100%; border: 4px solid var(--accent-surface); transform: scaleX(-1); }
        #teleprompter { position: absolute; top: 10%; left: 10%; width: 80%; height: 60%; color: white; background: rgba(0,0,0,0.5); padding: 15px; border-radius: 5px; overflow-y: auto; font-size: 1.5rem; text-align: center; pointer-events: none; }
    </style>
</head>
<body class="electric-sky" id="appRoot">

    <header id="globalHeader" class="header-electric">
        <div style="font-weight: bold; font-size: 1.2rem;">LensFlow <span style="font-weight: 300;">| Unified</span></div>
        <button class="btn btn-focus" onclick="toggleMode()" id="modeToggleBtn">Switch to FocusEngine</button>
    </header>

    <div class="app-container">
        <div id="managementView">
            <h1>Dashboard</h1>
            <textarea id="scriptInput" style="width: 100%; height: 100px; margin-bottom: 20px;" placeholder="Paste your script here..."></textarea>
            <h3>Recent Recordings</h3>
            <ul id="archiveList" class="card" style="list-style: none; padding: 0;"><li>No recordings found.</li></ul>
        </div>

        <div id="recordingView" style="display: none;">
            <div class="video-wrapper">
                <video id="cameraFeed" autoplay playsinline muted></video>
                <div id="teleprompter">Your script will appear here...</div>
            </div>
            <button id="recBtn" class="btn btn-focus" style="margin-top:20px; padding: 15px 40px; font-size: 1.2rem;" onclick="toggleRecording()">Start Recording</button>
        </div>
    </div>

    <script>
        const video = document.getElementById('cameraFeed');
        const recBtn = document.getElementById('recBtn');
        const teleprompter = document.getElementById('teleprompter');
        const scriptInput = document.getElementById('scriptInput');
        const archiveList = document.getElementById('archiveList');
        
        let mediaRecorder, recordedChunks = [];

        // Teleprompter Sync
        scriptInput.oninput = () => { teleprompter.innerText = scriptInput.value; };

        // Camera & Recording Logic
        async function startCamera() { try { const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true }); video.srcObject = stream; } catch (e) { alert("Camera access denied."); } }

        function toggleRecording() {
            if (!mediaRecorder || mediaRecorder.state === 'inactive') {
                recordedChunks = [];
                mediaRecorder = new MediaRecorder(video.srcObject);
                mediaRecorder.ondataavailable = e => recordedChunks.push(e.data);
                mediaRecorder.onstop = saveRecording;
                mediaRecorder.start();
                recBtn.innerText = "Stop Recording";
                recBtn.style.backgroundColor = "#EF4444";
            } else {
                mediaRecorder.stop();
                recBtn.innerText = "Start Recording";
                recBtn.style.backgroundColor = "var(--accent-surface)";
            }
        }

        function saveRecording() {
            const blob = new Blob(recordedChunks, { type: 'video/webm' });
            const li = document.createElement('li');
            li.innerHTML = `🎥 Recording saved: ${new Date().toLocaleTimeString()} <a href="${URL.createObjectURL(blob)}" download="vid.webm">Download</a>`;
            if(archiveList.innerText === "No recordings found.") archiveList.innerHTML = '';
            archiveList.appendChild(li);
        }

        function toggleMode() {
            const root = document.getElementById('appRoot'), header = document.getElementById('globalHeader'), btn = document.getElementById('modeToggleBtn'), mgmt = document.getElementById('managementView'), rec = document.getElementById('recordingView');
            const isElectric = root.classList.contains('electric-sky');
            
            root.className = isElectric ? 'focus-engine' : 'electric-sky';
            header.className = isElectric ? 'header-focus' : 'header-electric';
            mgmt.style.display = isElectric ? 'none' : 'block';
            rec.style.display = isElectric ? 'block' : 'none';
            btn.innerText = isElectric ? "Switch to Electric Sky" : "Switch to FocusEngine";
            
            if (!isElectric) { /* Back to management */ } else { startCamera(); }
        }
    </script>
</body>
</html>
