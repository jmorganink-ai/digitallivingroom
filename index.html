<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LensFlow | Unified Platform</title>
    <style>
        :root {
            --bg-main: #F0F9FF; --accent-main: #F59E0B; --text-main: #1E293B;
            --bg-surface: #1E293B; --accent-surface: #22C55E; --text-surface: #F8FAFC;
        }
        body, html { margin: 0; padding: 0; font-family: sans-serif; height: 100%; transition: background-color 0.4s ease; }
        
        #globalHeader { height: 60px; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; border-bottom: 2px solid transparent; transition: all 0.4s ease; }
        .header-electric { background: #fff; border-bottom-color: var(--accent-main); color: var(--text-main); }
        .header-focus { background: #0f172a; border-bottom-color: var(--accent-surface); color: var(--text-surface); }

        .app-container { height: calc(100vh - 60px); width: 100vw; display: flex; flex-direction: column; align-items: center; padding: 40px 20px; box-sizing: border-box; overflow-y: auto; }

        .electric-sky { background-color: var(--bg-main); color: var(--text-main); }
        .focus-engine { background-color: var(--bg-surface); color: var(--text-surface); }

        .btn { padding: 10px 20px; cursor: pointer; border: none; border-radius: 5px; font-weight: bold; }
        #managementView, #recordingView { width: 100%; max-width: 900px; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; margin-bottom: 40px; }
        .card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); color: var(--text-main); }
        
        #cameraFeed { background: #000; border-radius: 10px; width: 100%; border: 4px solid var(--accent-surface); transform: scaleX(-1); }
        .timer { font-size: 2rem; font-family: monospace; margin: 10px 0; display: block; }
    </style>
</head>
<body class="electric-sky" id="appRoot">

    <header id="globalHeader" class="header-electric">
        <div style="font-weight: bold; font-size: 1.2rem;">LensFlow <span style="font-weight: 300;">| Glimr</span></div>
        <button class="btn btn-focus" onclick="toggleMode()" id="modeToggleBtn">Switch to FocusEngine</button>
    </header>

    <div class="app-container">
        <!-- MANAGEMENT LAYER -->
        <div id="managementView">
            <h1>Platform Dashboard</h1>
            <div class="stats-grid">
                <div class="card"><h3>Active Leads</h3><p id="glimrLeads">Loading...</p></div>
                <div class="card"><h3>Storage</h3><p id="storageUsage">0%</p></div>
                <div class="card"><h3>Status</h3><p>Online</p></div>
            </div>
            <h3>Recent Recordings</h3>
            <div id="archiveList" class="card">No recordings found.</div>
        </div>

        <!-- RECORDING LAYER -->
        <div id="recordingView" style="display: none;">
            <video id="cameraFeed" autoplay playsinline muted></video>
            <span id="timer" class="timer">00:00</span>
            <button id="recBtn" class="btn btn-focus" style="padding: 15px 40px; font-size: 1.2rem;" onclick="toggleRecording()">Start Recording</button>
        </div>
    </div>

    <script>
        const video = document.getElementById('cameraFeed');
        const recBtn = document.getElementById('recBtn');
        const timerDisplay = document.getElementById('timer');
        let mediaRecorder, recordedChunks = [], timerInterval, seconds = 0;

        // --- GLIMR DATA SYNC ---
        async function fetchGlimrData() {
            try {
                // Replace with your actual Glimr/LensFlow API endpoint
                const response = await fetch('https://api.lensflow.com.au/stats'); 
                const data = await response.json();
                document.getElementById('glimrLeads').innerText = data.leads || "0";
                document.getElementById('storageUsage').innerText = data.storage || "0%";
            } catch (error) {
                console.warn("Glimr API connection offline. Using fallback data.");
                document.getElementById('glimrLeads').innerText = "12"; // Fallback
                document.getElementById('storageUsage').innerText = "45%";
            }
        }

        window.onload = () => { 
            if(localStorage.getItem('mode') === 'focus') toggleMode(); 
            fetchGlimrData(); 
        };

        // --- RECORDING LOGIC ---
        async function startCamera() { try { const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true }); video.srcObject = stream; } catch (e) { alert("Camera denied"); } }

        function toggleRecording() {
            if (!mediaRecorder || mediaRecorder.state === 'inactive') {
                seconds = 0;
                recordedChunks = [];
                mediaRecorder = new MediaRecorder(video.srcObject);
                mediaRecorder.ondataavailable = e => recordedChunks.push(e.data);
                mediaRecorder.onstop = saveRecording;
                mediaRecorder.start();
                timerInterval = setInterval(() => { seconds++; timerDisplay.innerText = new Date(seconds * 1000).toISOString().substr(14, 5); }, 1000);
                recBtn.innerText = "Stop Recording";
                recBtn.style.backgroundColor = "#EF4444";
            } else {
                mediaRecorder.stop();
                clearInterval(timerInterval);
                recBtn.innerText = "Start Recording";
                recBtn.style.backgroundColor = "var(--accent-surface)";
            }
        }

        function saveRecording() {
            const blob = new Blob(recordedChunks, { type: 'video/webm' });
            document.getElementById('archiveList').innerHTML = `<p>Recording saved: ${new Date().toLocaleTimeString()}</p>`;
        }

        function toggleMode() {
            const root = document.getElementById('appRoot'), header = document.getElementById('globalHeader'), btn = document.getElementById('modeToggleBtn'), mgmt = document.getElementById('managementView'), rec = document.getElementById('recordingView');
            const isElectric = root.classList.contains('electric-sky');
            
            root.className = isElectric ? 'focus-engine' : 'electric-sky';
            header.className = isElectric ? 'header-focus' : 'header-electric';
            mgmt.style.display = isElectric ? 'none' : 'block';
            rec.style.display = isElectric ? 'block' : 'none';
            btn.innerText = isElectric ? "Switch to Electric Sky" : "Switch to FocusEngine";
            btn.className = isElectric ? 'btn btn-electric' : 'btn btn-focus';
            
            localStorage.setItem('mode', isElectric ? 'focus' : 'electric');
            if (!isElectric) clearInterval(timerInterval); else startCamera();
        }
    </script>
</body>
</html>
